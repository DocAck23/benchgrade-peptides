<!doctype html>
<html><head><meta charset="utf-8"><title>F6 logo inspect</title>
<style>
  body { margin: 0; background: #2a2422; font-family: ui-monospace, monospace; color: #ccc; padding: 24px; }
  .row { display: flex; gap: 24px; margin-bottom: 32px; }
  .panel { background: #F2EAD9; padding: 24px; }
  .panel.dark { background: #5C1A1A; }
  .panel h3 { font-family: serif; color: inherit; }
  .panel.dark h3 { color: #B8923A; }
  img { display: block; }
  .label { font-size: 11px; opacity: 0.7; margin-bottom: 8px; }
  h2 { font-family: serif; font-weight: 400; }
</style></head>
<body>
  <h2>F6 vector — letter inspection (B, E, N edges)</h2>
  <div class="row">
    <div class="panel">
      <div class="label">Maroon vector on cream — full size</div>
      <img src="vial-templates/F6-maroon-vector.svg?v=4" style="width:600px;">
    </div>
    <div class="panel dark">
      <div class="label" style="color:rgba(247,244,238,0.7)">Gold vector on maroon — full size</div>
      <img src="vial-templates/F6-gold-vector.svg?v=4" style="width:600px;">
    </div>
  </div>
  <div class="row">
    <div class="panel">
      <div class="label">Maroon — 2× zoom on wordmark</div>
      <div style="overflow:hidden;width:600px;height:160px;">
        <img src="vial-templates/F6-maroon-vector.svg?v=4" style="width:1200px;margin-top:-720px;margin-left:0;">
      </div>
    </div>
  </div>
</body></html>
