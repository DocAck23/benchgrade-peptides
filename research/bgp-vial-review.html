<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BGP — Vial Refinement Review (20 done)</title>
<style>
  body { margin: 0; background: #0E1314; color: #E8E2D2; font-family: -apple-system, "Inter", sans-serif; }
  header { padding: 28px; text-align: center; border-bottom: 1px solid rgba(232,226,210,0.1); }
  header h1 { margin: 0 0 6px; font-family: "Cormorant Garamond", "Times New Roman", serif; font-weight: 500; font-size: 2rem; }
  header p { opacity: 0.7; margin: 0; font-size: 13px; }
  .ref { padding: 24px; text-align: center; border-bottom: 1px solid rgba(232,226,210,0.06); }
  .ref h2 { margin: 0 0 8px; font-family: "Cormorant Garamond", serif; font-weight: 500; font-size: 1.3rem; color: #C8A046; }
  .ref img { max-width: 360px; border-radius: 8px; }
  .batch { padding: 22px 24px 8px; max-width: 1640px; margin: 0 auto; }
  .batch h3 { margin: 0 0 12px; font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #C8A046; opacity: 0.85; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; padding: 0 24px 24px; max-width: 1640px; margin: 0 auto; }
  .card { background: #14191B; border: 1px solid rgba(232,226,210,0.08); border-radius: 8px; overflow: hidden; }
  .card .img { background: #F2EAD9; aspect-ratio: 1; }
  .card img { display: block; width: 100%; height: 100%; object-fit: contain; }
  .card .meta { padding: 10px 12px; border-top: 1px solid rgba(232,226,210,0.06); }
  .card .name { font-family: "Cormorant Garamond", serif; font-size: 16px; font-weight: 600; color: #fff; margin: 0; }
  .card .dose { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #C8A046; margin: 2px 0 0; }
  .card .note { font-size: 11px; color: #c97a7a; margin: 6px 0 0; line-height: 1.4; }
  .card .ok { color: #7ac9a6; }
</style>
</head>
<body>
<header>
  <h1>Bench Grade Peptides — Vial Refinement Review</h1>
  <p>20 of 65 vials revised against the NAD+ reference. Cache-busted with v=20.</p>
</header>

<div class="ref">
  <h2>Reference baseline</h2>
  <img src="_vials/nad-100mg.jpg?v=20" alt="NAD+ reference">
  <p style="margin-top:8px;font-size:12px;opacity:0.6;">NAD+ — every other vial should match this style</p>
</div>

<div class="batch"><h3>Batch 1 · 5 vials</h3></div>
<div class="grid" id="b1"></div>

<div class="batch"><h3>Batch 2 · 5 vials</h3></div>
<div class="grid" id="b2"></div>

<div class="batch"><h3>Batch 3 · 5 vials</h3></div>
<div class="grid" id="b3"></div>

<div class="batch"><h3>Batch 4 · 5 vials</h3></div>
<div class="grid" id="b4"></div>

<script>
  const batches = {
    b1: [
      { slug: "ipamorelin-5mg",     name: "Ipamorelin",   dose: "5 mg",   note: "⚠ dose pill stuck on \"5 NG\" — defer" },
      { slug: "cjc-1295-5mg",       name: "CJC-1295",     dose: "5 mg",   note: "✓ oval filled, formula readable, SKU correct", ok: true },
      { slug: "ll-37-5mg",          name: "LL-37",        dose: "5 mg",   note: "✓ real QR removed, placeholder text", ok: true },
      { slug: "ghk-cu-50mg",        name: "GHK-Cu",       dose: "50 mg",  note: "✓ barcode removed, full cap visible", ok: true },
      { slug: "glow-blend-70mg",    name: "GLOW Blend",   dose: "70 mg",  note: "✓ SKU bleed removed", ok: true },
    ],
    b2: [
      { slug: "ahk-cu-20mg",        name: "AHK-Cu",       dose: "20 mg",  note: "✓ real QR removed, LOT/EXP filled, oval pill, SKU corrected", ok: true },
      { slug: "pt-141-10mg",        name: "PT-141",       dose: "10 mg",  note: "✓ HPLC text removed, oval pill, dose pill 10 MG", ok: true },
      { slug: "melanotan-2-10mg",   name: "Melanotan-2",  dose: "10 mg",  note: "✓ HPLC text removed, oval pill, dose pill 10 MG", ok: true },
      { slug: "sermorelin-5mg",     name: "Sermorelin",   dose: "5 mg",   note: "✓ NAD SKU replaced with SER", ok: true },
      { slug: "klow-blend-80mg",    name: "KLOW Blend",   dose: "80 mg",  note: "✓ QR placeholder filled, 99% PURITY arrow added", ok: true },
    ],
    b3: [
      { slug: "mots-c-10mg",        name: "MOTS-c",       dose: "10 mg",  note: "✓ vial centered, no floating logos | ⚠ dose pill regressed to \"10 NG\"" },
      { slug: "bpc-157-5mg",        name: "BPC-157",      dose: "5 mg",   note: "✓ \"BENCH\" spelled correctly, NAD removed from SKU", ok: true },
      { slug: "follistatin-344-1mg",name: "Follistatin-344", dose: "1 mg",note: "✓ name extended, SKU updated | ⚠ trailing 4 still partial, framing portrait" },
      { slug: "hexarelin-5mg",      name: "Hexarelin",    dose: "5 mg",   note: "✓ SKU BGP-HEX-5, clean", ok: true },
      { slug: "tesamorelin-5mg",    name: "Tesamorelin",  dose: "5 mg",   note: "✓ SKU BGP-TES-5, clean", ok: true },
    ],
    b4: [
      { slug: "cjc-1295-ipamorelin-5mg", name: "CJC-1295 + Ipamorelin", dose: "5/5 mg", note: "✓ floating logo removed, vial centered", ok: true },
      { slug: "bpc-157-tb-500-5mg", name: "BPC-157 / TB-500", dose: "5/5 mg", note: "✓ HPLC removed, oval badge, arrow ok | ⚠ wreath crest replaced with shield" },
      { slug: "semax-5mg",          name: "Semax",        dose: "5 mg",   note: "✓ HPLC removed, oval pill | ⚠ wreath frame is empty (microscopist gone)" },
      { slug: "igf-1-lr3-1mg",      name: "IGF-1 LR3",    dose: "1 mg",   note: "✓ SKU BGP-IGF-1, clean", ok: true },
      { slug: "cjc-1295-w-dac-5mg", name: "CJC-1295 w/ DAC", dose: "5 mg", note: "✓ garbled MJCDAC SKU cleaned", ok: true },
    ],
  };
  for (const [bid, items] of Object.entries(batches)) {
    const grid = document.getElementById(bid);
    for (const it of items) {
      const c = document.createElement("div");
      c.className = "card";
      c.innerHTML = `
        <div class="img"><img src="_vials/${it.slug}.jpg?v=20" alt="${it.name} ${it.dose}"></div>
        <div class="meta">
          <p class="name">${it.name}</p>
          <p class="dose">${it.dose}</p>
          <p class="note ${it.ok ? "ok" : ""}">${it.note}</p>
        </div>
      `;
      grid.appendChild(c);
    }
  }
</script>
</body>
</html>
