<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="250" height="335" viewBox="0 0 250 335"
     font-family="'Cormorant Garamond', 'Times New Roman', serif">
  <!-- Variant A — Maroon ground, gold F6 + cream lab data. Most "branded". -->
  <defs>
    <style>
      .maroon { fill: #5C1A1A; }
      .gold { fill: #B8923A; }
      .cream { fill: #F2EAD9; }
      .gold-stroke { stroke: #B8923A; fill: none; }
      .display { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
      .sans { font-family: 'Inter', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
    </style>
  </defs>
  <rect width="250" height="335" class="maroon"/>

  <!-- F6 logo top center, small -->
  <image x="92" y="10" width="66" height="50"
         xlink:href="../vial-templates/F6-gold-vector.svg"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Hairline divider -->
  <line x1="40" y1="64" x2="210" y2="64" class="gold-stroke" stroke-width="0.4" opacity="0.6"/>

  <!-- Product name -->
  <text x="125" y="100" text-anchor="middle" class="cream display"
        font-size="28" font-weight="700" letter-spacing="-0.3">BPC-157</text>

  <!-- Dose pill -->
  <g transform="translate(95,112)">
    <rect width="60" height="22" class="gold-stroke" stroke-width="1.2" rx="2"/>
    <text x="30" y="15" text-anchor="middle" class="gold mono"
          font-size="11" font-weight="600" letter-spacing="1.2">5 MG</text>
  </g>

  <!-- Lab data block — mono, cream -->
  <g transform="translate(28,158)">
    <text class="cream mono" font-size="7.5" letter-spacing="0.5">
      <tspan x="0" y="0"><tspan class="gold">Formula  </tspan>C₆₂H₉₈N₁₆O₂₂</tspan>
      <tspan x="0" y="11"><tspan class="gold">MW       </tspan>1419.55 g/mol</tspan>
      <tspan x="0" y="22"><tspan class="gold">CAS      </tspan>137525-51-0</tspan>
      <tspan x="0" y="33"><tspan class="gold">Purity   </tspan>≥99% (HPLC)</tspan>
      <tspan x="0" y="44"><tspan class="gold">Storage  </tspan>-20°C</tspan>
      <tspan x="0" y="55"><tspan class="gold">SKU      </tspan>BGP-BPC157-5</tspan>
      <tspan x="0" y="66"><tspan class="gold">LOT      </tspan>H.012526</tspan>
    </text>
  </g>

  <!-- 99% PURITY banner -->
  <g transform="translate(28,242)">
    <rect width="194" height="22" class="gold"/>
    <text x="97" y="15" text-anchor="middle" class="maroon mono"
          font-size="9" font-weight="700" letter-spacing="2.4">99% PURITY · HPLC</text>
  </g>

  <!-- RUO disclaimer -->
  <text x="125" y="288" text-anchor="middle" class="cream mono"
        font-size="6.5" letter-spacing="1.6" opacity="0.85">FOR LABORATORY RESEARCH USE ONLY</text>

  <!-- Bottom hairline + origin -->
  <line x1="40" y1="302" x2="210" y2="302" class="gold-stroke" stroke-width="0.4" opacity="0.5"/>
  <text x="125" y="318" text-anchor="middle" class="gold mono"
        font-size="6" letter-spacing="1.4">EST. 2026 · MADE IN USA</text>
</svg>
