<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="250" height="335" viewBox="0 0 250 335"
     font-family="'Cormorant Garamond', 'Times New Roman', serif">
  <!-- Variant C — Split design. Maroon top (brand + name + dose),
       Cream bottom (lab data). Best of both — branded but legible. -->
  <defs>
    <style>
      .maroon { fill: #5C1A1A; }
      .gold { fill: #B8923A; }
      .cream-bg { fill: #F2EAD9; }
      .cream { fill: #F2EAD9; }
      .gold-stroke { stroke: #B8923A; fill: none; }
      .maroon-stroke { stroke: #5C1A1A; fill: none; }
      .display { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
      .sans { font-family: 'Inter', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
    </style>
  </defs>

  <!-- Top half: maroon ground -->
  <rect width="250" height="160" class="maroon"/>
  <!-- Bottom half: cream ground -->
  <rect y="160" width="250" height="175" class="cream-bg"/>

  <!-- F6 logo top center -->
  <image x="92" y="8" width="66" height="50"
         xlink:href="../vial-templates/F6-gold-vector.svg"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Hairline divider in top half -->
  <line x1="40" y1="62" x2="210" y2="62" class="gold-stroke" stroke-width="0.4" opacity="0.6"/>

  <!-- Product name (cream on maroon) -->
  <text x="125" y="98" text-anchor="middle" class="cream display"
        font-size="28" font-weight="700" letter-spacing="-0.3">BPC-157</text>

  <!-- Dose pill -->
  <g transform="translate(95,110)">
    <rect width="60" height="22" class="gold-stroke" stroke-width="1.2" rx="2"/>
    <text x="30" y="15" text-anchor="middle" class="gold mono"
          font-size="11" font-weight="600" letter-spacing="1.2">5 MG</text>
  </g>

  <!-- 99% PURITY banner — bridges the split, sits at the seam -->
  <g transform="translate(28,148)">
    <rect width="194" height="22" class="gold"/>
    <text x="97" y="15" text-anchor="middle" class="maroon mono"
          font-size="9" font-weight="700" letter-spacing="2.4">99% PURITY · HPLC</text>
  </g>

  <!-- Lab data block (maroon on cream) -->
  <g transform="translate(28,188)">
    <text class="maroon mono" font-size="7.5" letter-spacing="0.5">
      <tspan x="0" y="0"><tspan opacity="0.55">Formula  </tspan>C₆₂H₉₈N₁₆O₂₂</tspan>
      <tspan x="0" y="11"><tspan opacity="0.55">MW       </tspan>1419.55 g/mol</tspan>
      <tspan x="0" y="22"><tspan opacity="0.55">CAS      </tspan>137525-51-0</tspan>
      <tspan x="0" y="33"><tspan opacity="0.55">Purity   </tspan>≥99% (HPLC)</tspan>
      <tspan x="0" y="44"><tspan opacity="0.55">Storage  </tspan>-20°C</tspan>
      <tspan x="0" y="55"><tspan opacity="0.55">SKU      </tspan>BGP-BPC157-5</tspan>
      <tspan x="0" y="66"><tspan opacity="0.55">LOT      </tspan>H.012526</tspan>
    </text>
  </g>

  <!-- RUO disclaimer -->
  <text x="125" y="285" text-anchor="middle" class="maroon mono"
        font-size="6.5" letter-spacing="1.6" opacity="0.8">FOR LABORATORY RESEARCH USE ONLY</text>

  <line x1="40" y1="298" x2="210" y2="298" class="maroon-stroke" stroke-width="0.4" opacity="0.4"/>
  <text x="125" y="316" text-anchor="middle" class="maroon mono"
        font-size="6" letter-spacing="1.4" font-weight="600">EST. 2026 · MADE IN USA</text>
</svg>
