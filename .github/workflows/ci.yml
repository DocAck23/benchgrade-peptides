name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Compliance linter
        run: npm run lint:content

      - name: Unit tests
        run: npm test

      # Build runs last because it's the slowest — catching type/test
      # failures first gives faster feedback.
      - name: Next build
        env:
          # Dummy values are fine for build-time — the server action
          # doesn't run at build. Real keys live in Vercel env.
          NEXT_PUBLIC_SITE_URL: https://benchgradepeptides.com
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
        run: npm run build
